
version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: assessment_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d assessment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@database:5432/assessment_db?schema=public
    depends_on:
      database:
        condition: service_healthy # מבטיח שהאפליקציה תעלה רק אחרי שה-DB מוכן לקבל חיבורים
    command: >
      sh -c "npx prisma db push --accept-data-loss && node src/main.js"